name: Test Setup

# どのタイミングでテストを実行するか
on:
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch: # 手動で実行できるボタンを追加

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-mac:
    # GitHubが用意する最新のmacOS仮想環境を使用
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      # 1. あなたのリポジトリのコードをこの仮想Macにダウンロードする
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space on CI runner
        run: |
          echo "CI環境の空き容量を確保するために不要なプリインストールアプリを削除します..."
          # 最初から入っている巨大なXcode（約30GB）とシミュレーターを削除
          sudo rm -rf /Applications/Xcode*.app
          sudo rm -rf /Library/Developer/CoreSimulator/Profiles/Runtimes/*
          echo "現在のディスク空き容量:"
          df -h

      # 2. setup.sh を実行する
      - name: Run setup.sh
        # CIではbrew bundleを検証しつつ、重い言語環境構築だけをスキップする
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_METAOCAML_SETUP: "1"
          SKIP_MISE_INSTALL: "1"
        run: |
          # 実行権限を付与
          chmod +x setup.sh
          
          # CI環境なので --dry-run はつけず、brew bundle まで本実行する
          DOTFILES_DIR="$PWD" ./setup.sh

      # 3. (オプション) もしエラーが起きたら、ログファイルの中身を表示する
      - name: Show log file on failure
        if: failure()
        run: |
          if [ -f "$HOME/.dotfiles-setup.log" ]; then
            cat "$HOME/.dotfiles-setup.log"
          fi
